name: 自动部署到VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建生产版本
        run: npm run build

      - name: 部署到VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 36.151.144.113
          username: root
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          port: 22
          script: |
            cd /usr/share/nginx/aimar-robot
            git pull origin main
            systemctl reload nginx
